<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Dégradé fond principal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A5298;stop-opacity:1" />
    </linearGradient>
    <!-- Dégradé accent orange -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <!-- Ombre douce -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0A1628" flood-opacity="0.35"/>
    </filter>
    <!-- Ombre légère pour icône -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0A1628" flood-opacity="0.25"/>
    </filter>
    <!-- Brillance subtile -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <clipPath id="roundedClip">
      <rect x="40" y="40" width="320" height="320" rx="72" ry="72"/>
    </clipPath>
  </defs>

  <!-- Fond arrondi principal -->
  <rect x="40" y="40" width="320" height="320" rx="72" ry="72"
        fill="url(#bgGrad)" filter="url(#softShadow)"/>

  <!-- Brillance subtile en haut -->
  <rect x="40" y="40" width="320" height="160" rx="72" ry="72"
        fill="url(#shineGrad)" clip-path="url(#roundedClip)"/>

  <!-- Motif géométrique décoratif (cercles concentriques discrets en bas-droit) -->
  <circle cx="340" cy="340" r="90" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <circle cx="340" cy="340" r="60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <circle cx="340" cy="340" r="30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>

  <!-- === ICÔNE CENTRALE === -->
  <!-- Silhouette humaine stylisée (employé) -->
  <g filter="url(#iconShadow)" transform="translate(200, 175)">
    <!-- Tête -->
    <circle cx="0" cy="-54" r="26" fill="#ffffff"/>
    <!-- Corps / épaules arrondies -->
    <path d="M-42 10 Q-42 -22 0 -22 Q42 -22 42 10 L42 32 Q42 44 30 44 L-30 44 Q-42 44 -42 32 Z"
          fill="#ffffff"/>
  </g>

  <!-- Badge de pointage (check dans un cercle orange) — superposé en bas à droite de la silhouette -->
  <circle cx="258" cy="232" r="28" fill="url(#orangeGrad)" filter="url(#iconShadow)"/>
  <!-- Coche -->
  <polyline points="246,232 254,242 272,220"
            fill="none" stroke="#ffffff" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === TEXTE === -->
  <!-- "CRFC" grand -->
  <text x="200" y="305"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="48"
        font-weight="700"
        letter-spacing="8"
        text-anchor="middle"
        fill="#ffffff">CRFC</text>

  <!-- Ligne séparatrice fine -->
  <line x1="120" y1="318" x2="280" y2="318"
        stroke="#F97316" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- "POINTAGE" petit, espacé -->
  <text x="200" y="342"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="16"
        font-weight="400"
        letter-spacing="5"
        text-anchor="middle"
        fill="#ffffff"
        opacity="0.75">POINTAGE</text>

</svg>
